t. No commitment required for the discovery call."},{q:"How long does a typical project take?",a:"Project timelines vary based on scope and complexity. A landing page or branding project typically takes 2–4 weeks. A full web application or e-commerce platform ranges from 6–16 weeks. During discovery, we'll provide a precise timeline with milestones and deadlines."},{q:"Do you work with startups or only enterprises?",a:"We work with both. Our portfolio includes funded startups building their first product and Fortune 500 enterprises rebuilding legacy systems. What matters to us is ambition and alignment — if you're serious about your digital presence, we're serious about helping you."},{q:"Can I see examples of your previous work?",a:"Absolutely. Our Work page showcases selected case studies with results and metrics. We also have a more extensive portfolio we can share during a discovery call, including work under NDA that we're authorized to show confidentially."}]},{category:"Pricing & Contracts",questions:[{q:"How does your pricing work?",a:"We offer both project-based and retainer pricing. Project pricing is scoped upfront with a fixed quote — no surprise invoices. Retainers are for ongoing development, support, and growth optimization. Pricing depends on scope, complexity, and team composition."},{q:"What is your typical project investment range?",a:"Entry-level web projects start at 35,000. Mid-complexity applications and e-commerce platforms range from 50,000–80,000. Enterprise-scale builds and ongoing retainers are scoped individually. We match investment to impact — everything we recommend has a clear ROI rationale."},{q:"Do you require payment upfront?",a:"We use milestone-based payment structures. Typically: 40% to begin, 40% at design approval, and 20% upon launch. For larger projects, we may structure additional interim milestones. We never ask for 100% upfront."},{q:"What does your contract include?",a:"Every engagement includes a detailed Statement of Work (SOW) specifying deliverables, timelines, revision rounds, payment milestones, IP ownership (you own everything we build for you), and post-launch support terms. We use plain-English contracts reviewed by our legal team."}]},{category:"Development & Design",questions:[{q:"What technologies do you specialize in?",a:"Our primary stack includes React,JavaScript,HTML5,CSS3,LARAVEL,PHP, TypeScript, Node.js, Python, and MySQL for development. We deploy on Vercel, and Github with Terraform for infrastructure. For design, we work in Figma,Adobe Photoshop and Google Stitch. We always select the right tool for each project's specific needs."},{q:"Do you design and develop, or do you only do one?",a:"We do both — end to end. Our in-house team covers UI/UX research and design, frontend and backend development, infrastructure, QA, and ongoing support. This unified approach eliminates the communication gaps and delays that come from coordinating separate agencies."},{q:"How many revisions are included?",a:"Design phases include 2 rounds of revisions per deliverable. Development includes 2 rounds of feedback post-delivery. We find this sufficient for virtually all projects when we have clear discovery documentation. Additional revision rounds can be added for a transparent hourly rate."},{q:"Will my website be mobile-friendly and accessible?",a:"Every project we ship is fully responsive, tested across 20+ device configurations, and meets WCAG 2.1 AA accessibility standards as a baseline. Performance on mobile is a primary concern, not an afterthought — we optimize for Core Web Vitals on all device types."}]},{category:"Support & Maintenance",questions:[{q:"What happens after the website launches?",a:"Every project includes a 15-day post-launch support window for bug fixes and minor adjustments at no extra cost. Beyond that, we offer monthly retainer packages for ongoing development, content updates, security monitoring, and strategic growth support."},{q:"Do you provide hosting and domain services?",a:"We configure and optimize your hosting environment on your preferred platform (AWS, Vercel, Netlify, etc.) but the hosting account is in your name. We don't resell hosting or create dependency. You always own and control your infrastructure."},{q:"What if I need urgent support after launch?",a:"Retainer clients receive priority support with response times under 4 hours for critical issues. For non-retainer clients, we offer emergency support packages. We also provide thorough documentation and training so your team can handle day-to-day content management independently."},{q:"Can I transfer my project to an in-house team after completion?",a:"Absolutely — and we encourage it. We provide comprehensive technical documentation, codebase walkthroughs, and handover sessions for your in-house or third-party developers. Our code follows industry standards and is built to be maintainable by any competent team."}]}];function O3({q:n,a}){const[s,o]=T.useState(!1);return h.jsxs(re.div,{style:{borderBottom:"1px solid var(--border-subtle)",overflow:"hidden"},children:[h.jsxs("button",{onClick:()=>o(!s),style:{width:"100%",display:"flex",alignItems:"center",justifyContent:"space-between",padding:"24px 0",background:"transparent",border:"none",cursor:"none",textAlign:"left",gap:24},children:[h.jsx("span",{style:{fontFamily:"Space Grotesk, sans-serif",fontWeight:600,fontSize:17,color:s?"#49778e":"#f0f4f8",transition:"color 0.3s ease",lineHeight:1.4},children:n}),h.jsx("div",{style:{width:32,height:32,borderRadius:"50%",flexShrink:0,background:s?"rgba(0, 212, 255, 0.15)":"rgba(15, 21, 32, 0.8)",border:`1px solid ${s?"rgba(0, 212, 255, 0.3)":"var(--border-subtle)"}`,display:"flex",alignItems:"center",justifyContent:"center",color:s?"#00d4ff":"var(--text-secondary)",transition:"all 0.3s ease"},children:s?h.jsx(K5,{size:14}):h.jsx($5,{size:14})})]}),h.jsx(ir,{children:s&&h.jsx(re.div,{initial:{height:0,opacity:0},animate:{height:"auto",opacity:1},exit:{heigh
